<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6B45A"/>
      <stop offset="100%" stop-color="#CE8E31"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#CE8E31" stroke-opacity="0.18" stroke-width="3"/>

  <!-- ANCHOR — solid bronze strokes (no gradient: a vertical line under an
       objectBoundingBox gradient can collapse to zero-width and vanish). -->
  <g stroke="#CE8E31" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- shank: the long vertical spine, ring-top down to the crown -->
    <line x1="256" y1="158" x2="256" y2="392"/>
    <!-- stock: horizontal crossbar near the top -->
    <line x1="192" y1="208" x2="320" y2="208"/>
    <!-- arc / arms: wide U sweeping up into the flukes -->
    <path d="M132 296 C 132 372, 188 408, 256 408 C 324 408, 380 372, 380 296"/>
    <!-- left fluke barb -->
    <path d="M132 296 L104 262 M132 296 L172 310"/>
    <!-- right fluke barb -->
    <path d="M380 296 L408 262 M380 296 L340 310"/>
  </g>
  <!-- highlight pass: thin lighter stroke on top for a metal sheen -->
  <g stroke="#E6B45A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7">
    <line x1="256" y1="158" x2="256" y2="392"/>
    <line x1="192" y1="208" x2="320" y2="208"/>
    <path d="M132 296 C 132 372, 188 408, 256 408 C 324 408, 380 372, 380 296"/>
  </g>

  <!-- ring at top (the anchor's shackle) -->
  <circle cx="256" cy="138" r="32" fill="none" stroke="#CE8E31" stroke-width="24"/>
  <circle cx="256" cy="138" r="32" fill="none" stroke="#E6B45A" stroke-width="7" opacity="0.7"/>
</svg>