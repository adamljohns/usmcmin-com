<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000000"/>
  <!-- Ring at top -->
  <circle cx="50" cy="20" r="9" fill="none" stroke="#D4AF37" stroke-width="4.5"/>
  <!-- Shaft -->
  <line x1="50" y1="29" x2="50" y2="84" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="24" y1="44" x2="76" y2="44" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left curved fluke -->
  <path d="M50,84 Q28,78 22,63" fill="none" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right curved fluke -->
  <path d="M50,84 Q72,78 78,63" fill="none" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left fluke tip -->
  <circle cx="22" cy="63" r="4" fill="#D4AF37"/>
  <!-- Right fluke tip -->
  <circle cx="78" cy="63" r="4" fill="#D4AF37"/>
</svg>
