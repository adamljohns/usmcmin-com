<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000000"/>
  <!-- Target rings (slightly offset left to give arrow room) -->
  <circle cx="44" cy="54" r="30" fill="none" stroke="#D4AF37" stroke-width="4"/>
  <circle cx="44" cy="54" r="19" fill="none" stroke="#D4AF37" stroke-width="4"/>
  <circle cx="44" cy="54" r="8" fill="#D4AF37"/>
  <!-- Arrow — enters upper-right, exits lower-left well past the target -->
  <line x1="92" y1="10" x2="20" y2="82" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrowhead (pointing lower-left, extends past target) -->
  <polygon points="20,82 30,72 14,68" fill="#D4AF37"/>
  <!-- Fletching (upper-right tail) -->
  <line x1="92" y1="10" x2="82" y2="20" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="10" x2="83" y2="8" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
</svg>
