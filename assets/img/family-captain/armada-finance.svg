<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-label="The Family Captain · Armada Theme · 7-week framework">
  <title>The Family Captain — Armada Theme</title>
  <desc>Seven-week journey across Vision, Body, Spiritual, Husbanding, Fathering, Finance, and Sabbath.</desc>

  <!-- ── DEFS: gradients + filters ── -->
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F4E8D0"/>
      <stop offset="100%" stop-color="#D9C297"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#F4E8D0" stop-opacity="1"/>
      <stop offset="80%" stop-color="#D9C297" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D9C297" stop-opacity="0"/>
    </radialGradient>
    <!-- subtle paper grain via fractal noise (very low opacity) -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.7   0 0 0 0 0.6   0 0 0 0 0.45   0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <!-- ocean wave ripple texture -->
    <filter id="waves">
      <feTurbulence type="turbulence" baseFrequency="0.012 0.05" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.05   0 0 0 0 0.12   0 0 0 0 0.22   0 0 0 0.4 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND: parchment top, ocean bottom ── -->
  <rect width="1200" height="780.0" fill="url(#parchment)"/>
  <rect y="780.0" width="1200" height="720.0" fill="url(#ocean)"/>

  <!-- Subtle paper grain on parchment half -->
  <rect width="1200" height="780.0" filter="url(#grain)"/>
  <!-- Subtle wave ripple on ocean half -->
  <rect y="780.0" width="1200" height="720.0" filter="url(#waves)"/>

  <!-- Bronze inner frame -->
  <rect x="30" y="30" width="1140" height="1440" fill="none" stroke="#CE8E31" stroke-width="1.0" opacity="0.9"/>
  <rect x="40" y="40" width="1120" height="1420" fill="none" stroke="#CE8E31" stroke-width="0.4" opacity="0.6"/>

  <!-- Corner brackets -->
  
  <g stroke="#CE8E31" stroke-width="1.4" fill="none" opacity="0.95">
    <path d="M 30,94 L 30,30 L 94,30"/>
    <path d="M 41.519999999999996,62.0 L 41.519999999999996,41.519999999999996 L 62.0,41.519999999999996"/>
    <line x1="50.480000000000004" y1="50.480000000000004" x2="74.8" y2="74.8"/>
  </g>
  
  <g stroke="#CE8E31" stroke-width="1.4" fill="none" opacity="0.95">
    <path d="M 1170,94 L 1170,30 L 1106,30"/>
    <path d="M 1158.48,62.0 L 1158.48,41.519999999999996 L 1138.0,41.519999999999996"/>
    <line x1="1149.52" y1="50.480000000000004" x2="1125.2" y2="74.8"/>
  </g>
  
  <g stroke="#CE8E31" stroke-width="1.4" fill="none" opacity="0.95">
    <path d="M 30,1406 L 30,1470 L 94,1470"/>
    <path d="M 41.519999999999996,1438.0 L 41.519999999999996,1458.48 L 62.0,1458.48"/>
    <line x1="50.480000000000004" y1="1449.52" x2="74.8" y2="1425.2"/>
  </g>
  
  <g stroke="#CE8E31" stroke-width="1.4" fill="none" opacity="0.95">
    <path d="M 1170,1406 L 1170,1470 L 1106,1470"/>
    <path d="M 1158.48,1438.0 L 1158.48,1458.48 L 1138.0,1458.48"/>
    <line x1="1149.52" y1="1449.52" x2="1125.2" y2="1425.2"/>
  </g>

  <!-- ── TITLE BAND (top) ── -->
  <text x="600.0" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#1E293B" letter-spacing="6">ARMADA</text>
  <text x="600.0" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="500" fill="#475569" letter-spacing="4">THEME</text>
  <line x1="510.0" y1="190" x2="690.0" y2="190" stroke="#CE8E31" stroke-width="1.2"/>

  <!-- ── COMPASS RAYS (faint bronze rays from center circle out to themes) ── -->
  <line x1="600.0" y1="546.0" x2="600.0" y2="340.0" stroke="#CE8E31" stroke-width="0.6" opacity="0.45"/>
  <line x1="759.4936224234781" y1="622.8080804208183" x2="920.5509078118922" y2="494.3691812379193" stroke="#CE8E31" stroke-width="0.6" opacity="0.45"/>
  <line x1="798.885294085092" y1="795.3942705270881" x2="999.7204439945476" y2="841.233582922089" stroke="#CE8E31" stroke-width="0.6" opacity="0.45"/>
  <line x1="688.5122827799819" y1="933.7976490520934" x2="777.8923330381989" y2="1119.397235839992" stroke="#CE8E31" stroke-width="0.6" opacity="0.45"/>
  <line x1="511.48771722001817" y1="933.7976490520934" x2="422.1076669618012" y2="1119.397235839992" stroke="#CE8E31" stroke-width="0.6" opacity="0.45"/>
  <line x1="401.114705914908" y1="795.3942705270881" x2="200.27955600545226" y2="841.2335829220888" stroke="#CE8E31" stroke-width="0.6" opacity="0.45"/>
  <line x1="440.5063775765219" y1="622.8080804208184" x2="279.4490921881077" y2="494.3691812379193" stroke="#CE8E31" stroke-width="0.6" opacity="0.45"/>

  <!-- ── CENTRAL CIRCLE ── -->
  <circle cx="600.0" cy="750.0" r="210" fill="url(#centerGlow)" opacity="0.6"/>
  <circle cx="600.0" cy="750.0" r="200" fill="none" stroke="#CE8E31" stroke-width="1.8"/>
  <circle cx="600.0" cy="750.0" r="186" fill="none" stroke="#CE8E31" stroke-width="0.6" opacity="0.5"/>

  <!-- Center text — focus theme or ARMADA wordmark, auto-sized -->
  <text x="600.0" y="764.0" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#1E293B" letter-spacing="4">FINANCE</text>

  <!-- ── THEME LABELS AROUND PERIMETER ── -->
    <g>
    <text x="600.0" y="280.0" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="2" fill="#1E293B">VISION</text>
    <line x1="555.0" y1="292.0" x2="645.0" y2="292.0" stroke="#CE8E31" stroke-width="0.8" opacity="0.6"/>
    <text x="600.0" y="316.0" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#475569">Get clear on where you're leading</text>
<text x="600.0" y="334.0" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#475569">yourself, your marriage, and family.</text>
  </g>
  <g>
    <text x="967.4607967599741" y="456.95979312639525" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="2" fill="#1E293B">BODY</text>
    <line x1="922.4607967599741" y1="468.95979312639525" x2="1012.4607967599741" y2="468.95979312639525" stroke="#CE8E31" stroke-width="0.8" opacity="0.6"/>
    <text x="967.4607967599741" y="492.95979312639525" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#475569">Strengthen the body that carries</text>
<text x="967.4607967599741" y="510.95979312639525" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#475569">your family and your mission.</text>
  </g>
  <g>
    <text x="1058.2161187254571" y="854.5848389594678" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="2" fill="#FFFFFF">SPIRITUAL</text>
    <line x1="1013.2161187254571" y1="866.5848389594678" x2="1103.2161187254571" y2="866.5848389594678" stroke="#CE8E31" stroke-width="0.8" opacity="0.6"/>
    <text x="1058.2161187254571" y="890.5848389594678" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">Stay consistent in God's Word</text>
<text x="1058.2161187254571" y="908.5848389594678" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">and prayer; keep your heart steady.</text>
  </g>
  <g>
    <text x="803.9253573852525" y="1173.455367914137" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="2" fill="#FFFFFF">HUSBANDING</text>
    <line x1="758.9253573852525" y1="1185.455367914137" x2="848.9253573852525" y2="1185.455367914137" stroke="#CE8E31" stroke-width="0.8" opacity="0.6"/>
    <text x="803.9253573852525" y="1209.455367914137" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">Pursue, serve, and lead your wife</text>
<text x="803.9253573852525" y="1227.455367914137" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">with love and intention.</text>
  </g>
  <g>
    <text x="396.07464261474775" y="1173.455367914137" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="2" fill="#FFFFFF">FATHERING</text>
    <line x1="351.07464261474775" y1="1185.455367914137" x2="441.07464261474775" y2="1185.455367914137" stroke="#CE8E31" stroke-width="0.8" opacity="0.6"/>
    <text x="396.07464261474775" y="1209.455367914137" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">Be present, patient, and purposeful</text>
<text x="396.07464261474775" y="1227.455367914137" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">in how you raise your children.</text>
  </g>
  <g>
    <text x="141.78388127454286" y="854.5848389594676" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="2" fill="#CE8E31">FINANCE</text>
    <line x1="96.78388127454286" y1="866.5848389594676" x2="186.78388127454286" y2="866.5848389594676" stroke="#CE8E31" stroke-width="0.8" opacity="0.6"/>
    <text x="141.78388127454286" y="890.5848389594676" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FFFFFF">Manage money wisely and lead your</text>
<text x="141.78388127454286" y="908.5848389594676" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FFFFFF">home with financial order.</text>
  </g>
  <g>
    <text x="232.53920324002593" y="456.9597931263953" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="2" fill="#FFFFFF">SABBATH</text>
    <line x1="187.53920324002593" y1="468.9597931263953" x2="277.5392032400259" y2="468.9597931263953" stroke="#CE8E31" stroke-width="0.8" opacity="0.6"/>
    <text x="232.53920324002593" y="492.9597931263953" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">Slow down to rest, reflect,</text>
<text x="232.53920324002593" y="510.9597931263953" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#CBD5E1">and recharge for the week ahead.</text>
  </g>

  <!-- ── BOTTOM ORNAMENT ── -->
  
  <g stroke="#CE8E31" stroke-width="1.6" fill="none" transform="translate(578.0,1418)">
    <!-- Stylized anchor -->
    <circle cx="22" cy="6" r="4"/>
    <line x1="22" y1="10" x2="22" y2="38"/>
    <path d="M 6,30 Q 22,46 38,30" stroke-width="1.4"/>
    <line x1="14" y1="14" x2="30" y2="14" stroke-width="1.2"/>
  </g>

  <!-- Caption -->
  <text x="600.0" y="1478" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#CE8E31" letter-spacing="3" font-style="italic">THE FAMILY CAPTAIN · AI BOOT CAMP</text>
</svg>
