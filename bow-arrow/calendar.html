<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bow & Arrow Studio — Booking Calendar</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="dashboard">
        <nav>
            <span class="brand">🏹 Bow & Arrow</span>
            <a href="dashboard.html">Dashboard</a>
            <a href="calendar.html" class="active">Calendar</a>
            <a href="cleaning.html">Cleaning</a>
            <a href="financials.html">Financials</a>
            <a class="logout" onclick="logout()">Logout</a>
        </nav>

        <header>
            <h1>📅 Booking Calendar</h1>
            <div style="display:flex;align-items:center;gap:1rem">
                <button onclick="calPrev()" style="background:var(--saddle);color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer">← Prev</button>
                <span id="calMonthLabel" style="font-weight:700;font-size:1.1rem"></span>
                <button onclick="calNext()" style="background:var(--saddle);color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer">Next →</button>
            </div>
        </header>

        <!-- Legend -->
        <div style="display:flex;gap:1.5rem;margin-bottom:1rem;font-size:0.85rem;flex-wrap:wrap">
            <span><span style="display:inline-block;width:14px;height:14px;background:#c8e6c9;border-radius:3px;vertical-align:middle"></span> Occupied</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:white;border:1px solid var(--light-gray);border-radius:3px;vertical-align:middle"></span> Vacant</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#fff9c4;border-radius:3px;vertical-align:middle"></span> Cleaning</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#ffcdd2;border-radius:3px;vertical-align:middle"></span> Blocked</span>
        </div>

        <div style="overflow-x:auto">
            <div class="calendar-grid" id="calendarGrid">
                <p style="color:var(--gray);grid-column:1/-1;padding:2rem;text-align:center">Loading calendar...</p>
            </div>
        </div>

        <!-- Reservation List -->
        <h2 class="section-title" style="margin-top:2rem">📋 Upcoming Reservations</h2>
        <div class="card" id="reservationList"></div>
    </div>

    <script src="assets/dashboard.js"></script>
    <script>
        initCalendar();

        // Also render reservation list
        (async function() {
            const reservations = DEMO.reservations;
            const container = document.getElementById('reservationList');
            container.innerHTML = '<table><thead><tr><th>Guest</th><th>Property</th><th>Check-in</th><th>Check-out</th><th>Platform</th><th>Payout</th></tr></thead><tbody>' +
                reservations.map(r => `
                    <tr>
                        <td style="font-weight:600">${r.guest_name}</td>
                        <td>Apt ${r.apt_number}</td>
                        <td>${formatDate(r.checkin_date)}</td>
                        <td>${formatDate(r.checkout_date)}</td>
                        <td style="text-transform:capitalize">${r.platform}</td>
                        <td>${formatCurrency(r.payout)}</td>
                    </tr>
                `).join('') + '</tbody></table>';
        })();
    </script>
</body>
</html>
