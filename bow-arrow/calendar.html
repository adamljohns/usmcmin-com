<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bow & Arrow Studio — Booking Calendar</title>
    <meta property="og:type" content="website">
  <meta property="og:url" content="https://usmcmin.com/bow-arrow/calendar.html">
  <meta property="og:title" content="Bow & Arrow Studio — Booking Calendar">
  <meta property="og:description" content="Reservation calendar for Bow & Arrow Studio properties in Fredericksburg, VA.">
  <meta property="og:image" content="https://usmcmin.com/assets/img/adam-johns-portrait.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bow & Arrow Studio — Booking Calendar">
  <meta name="twitter:description" content="Reservation calendar for Bow & Arrow Studio properties in Fredericksburg, VA.">
  <meta name="twitter:image" content="https://usmcmin.com/assets/img/adam-johns-portrait.jpg">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="dashboard">
        <nav>
            <span class="brand">Bow & Arrow</span>
            <a href="dashboard.html">Dashboard</a>
            <a href="calendar.html" class="active">Calendar</a>
            <a href="cleaning.html">Cleaning</a>
            <a href="financials.html">Financials</a>
            <a href="booking.html">Book Direct</a>
            <a href="guests.html">Guest Info</a>
            <a class="logout" onclick="logout()">Logout</a>
        </nav>

        <header>
            <h1>Booking Calendar</h1>
            <div style="display:flex;align-items:center;gap:1rem">
                <button onclick="calPrev()" style="background:var(--terracotta);color:white;border:none;padding:0.5rem 1.25rem;border-radius:2px;cursor:pointer;font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;font-family:var(--font-sans)">← Prev</button>
                <span id="calMonthLabel" style="font-family:var(--font-serif);font-weight:600;font-size:1.15rem;color:var(--warm-brown)"></span>
                <button onclick="calNext()" style="background:var(--terracotta);color:white;border:none;padding:0.5rem 1.25rem;border-radius:2px;cursor:pointer;font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;font-family:var(--font-sans)">Next →</button>
            </div>
        </header>

        <!-- Legend -->
        <div style="display:flex;gap:2rem;margin-bottom:1.25rem;font-size:0.75rem;flex-wrap:wrap;font-family:var(--font-sans);letter-spacing:0.5px">
            <span><span style="display:inline-block;width:14px;height:14px;background:var(--sage-light);border-radius:2px;vertical-align:middle"></span> Occupied</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:var(--warm-white);border:1px solid var(--light-gray);border-radius:2px;vertical-align:middle"></span> Vacant</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#fff9c4;border-radius:2px;vertical-align:middle"></span> Cleaning</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#ffcdd2;border-radius:2px;vertical-align:middle"></span> Blocked</span>
        </div>

        <div style="overflow-x:auto">
            <div class="calendar-grid" id="calendarGrid">
                <p style="color:var(--gray);grid-column:1/-1;padding:2rem;text-align:center;font-family:var(--font-serif);font-style:italic">Loading calendar...</p>
            </div>
        </div>

        <!-- Reservation List -->
        <h2 class="section-title" style="margin-top:2rem">Upcoming Reservations</h2>
        <div class="card" id="reservationList"></div>
    </div>

    <script src="assets/dashboard.js"></script>
    <script>
        initCalendar();

        // Also render reservation list
        (async function() {
            const reservations = DEMO.reservations;
            const container = document.getElementById('reservationList');
            container.innerHTML = '<table><thead><tr><th>Guest</th><th>Property</th><th>Check-in</th><th>Check-out</th><th>Platform</th><th>Payout</th></tr></thead><tbody>' +
                reservations.map(r => `
                    <tr>
                        <td style="font-weight:600;font-family:var(--font-serif)">${r.guest_name}</td>
                        <td>Apt ${r.apt_number}</td>
                        <td>${formatDate(r.checkin_date)}</td>
                        <td>${formatDate(r.checkout_date)}</td>
                        <td style="text-transform:capitalize">${r.platform}</td>
                        <td style="font-weight:600">${formatCurrency(r.payout)}</td>
                    </tr>
                `).join('') + '</tbody></table>';
        })();
    </script>
</body>
</html>
