<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bow & Arrow Studio — Booking Calendar</title>
    <meta property="og:type" content="website">
  <meta property="og:url" content="https://usmcmin.com/bow-arrow/calendar.html">
  <meta property="og:title" content="Bow & Arrow Studio — Booking Calendar">
  <meta property="og:description" content="Reservation calendar for Bow & Arrow Studio properties in Fredericksburg, VA.">
  <meta property="og:image" content="https://usmcmin.com/assets/og/og-brotherhood.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bow & Arrow Studio — Booking Calendar">
  <meta name="twitter:description" content="Reservation calendar for Bow & Arrow Studio properties in Fredericksburg, VA.">
  <meta name="twitter:image" content="https://usmcmin.com/assets/og/og-brotherhood.jpg">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="dashboard">
        <nav>
            <span class="brand">Bow & Arrow</span>
            <a href="dashboard.html">Dashboard</a>
            <a href="calendar.html" class="active">Calendar</a>
            <a href="cleaning.html">Cleaning</a>
            <a href="financials.html">Financials</a>
            <a href="maintenance.html">Maintenance</a>
            <a href="comms.html">Comms</a>
            <a href="booking.html">Book Direct</a>
            <a href="guests.html">Guest Info</a>
            <a class="logout" onclick="logout()">Logout</a>
        </nav>

        <header>
            <h1>Booking Calendar</h1>
            <div style="display:flex;align-items:center;gap:1rem">
                <button onclick="calPrev()" style="background:var(--terracotta);color:white;border:none;padding:0.5rem 1.25rem;border-radius:2px;cursor:pointer;font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;font-family:var(--font-sans)">← Prev</button>
                <span id="calMonthLabel" style="font-family:var(--font-serif);font-weight:600;font-size:1.15rem;color:var(--warm-brown)"></span>
                <button onclick="calNext()" style="background:var(--terracotta);color:white;border:none;padding:0.5rem 1.25rem;border-radius:2px;cursor:pointer;font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;font-family:var(--font-sans)">Next →</button>
            </div>
        </header>

        <!-- Legend -->
        <div style="display:flex;gap:1.5rem;margin-bottom:1.25rem;font-size:0.75rem;flex-wrap:wrap;font-family:var(--font-sans);letter-spacing:0.5px">
            <span><span style="display:inline-block;width:14px;height:14px;background:#C4835A;border-radius:2px;vertical-align:middle"></span> Apt #6</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#8B9E7E;border-radius:2px;vertical-align:middle"></span> Apt #7</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#D4885A;border-radius:2px;vertical-align:middle"></span> Apt #8</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#6B4A3A;border-radius:2px;vertical-align:middle"></span> Cottage</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#C8918A;border-radius:2px;vertical-align:middle"></span> Combined</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:var(--warm-white);border:1px solid var(--light-gray);border-radius:2px;vertical-align:middle"></span> Vacant</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:var(--linen);border-radius:2px;vertical-align:middle"></span> Weekend</span>
        </div>

        <div style="overflow-x:auto">
            <div class="calendar-grid" id="calendarGrid">
                <p style="color:var(--gray);grid-column:1/-1;padding:2rem;text-align:center;font-family:var(--font-serif);font-style:italic">Loading calendar...</p>
            </div>
        </div>

        <!-- Reservation List -->
        <h2 class="section-title" style="margin-top:2rem">Upcoming Reservations</h2>
        <div class="card" id="reservationList"></div>
    </div>

    <script src="assets/dashboard.js"></script>
    <script>
        initCalendar();

        // Also render reservation list with enhanced info
        (async function() {
            const reservations = DEMO.reservations;
            const container = document.getElementById('reservationList');
            container.innerHTML = '<table><thead><tr><th>Guest</th><th>Property</th><th>Check-in</th><th>Check-out</th><th>Nights</th><th>Platform</th><th>Payout</th><th>$/Night</th><th>Status</th></tr></thead><tbody>' +
                reservations.map(r => {
                    const nights = nightsBetween(r.checkin_date, r.checkout_date);
                    const perNight = nights > 0 ? Math.round(r.payout / nights) : 0;
                    const statusColors = { checked_in: 'var(--sage)', confirmed: 'var(--blue)', completed: 'var(--gray)' };
                    const statusLabels = { checked_in: '🟢 Active', confirmed: '📋 Confirmed', completed: '✅ Done' };
                    return `
                        <tr>
                            <td style="font-weight:600;font-family:var(--font-serif)">${r.guest_name}</td>
                            <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px;background:${(PROPERTY_COLORS[r.apt_number] || {bg:'#999'}).bg}"></span>Apt ${r.apt_number}</td>
                            <td>${formatDate(r.checkin_date)}</td>
                            <td>${formatDate(r.checkout_date)}</td>
                            <td>${nights}</td>
                            <td style="text-transform:capitalize">${r.platform}</td>
                            <td style="font-weight:600">${formatCurrency(r.payout)}</td>
                            <td style="color:var(--gray)">${formatCurrency(perNight)}</td>
                            <td>${statusLabels[r.status] || r.status}</td>
                        </tr>
                    `;
                }).join('') + '</tbody></table>';
        })();
    </script>
<footer style="text-align:center; padding:28px 20px; border-top:1px solid var(--border,#333); margin-top:40px; color:var(--gray,#888); font-size:0.88rem;">
    <div style="margin-bottom:10px;"><img src="../assets/icons/shield-handshake.png" alt="" width="36" height="36" style="opacity:0.6;"></div>
    <p>
        <a href="../index.html" style="color:var(--gray,#888);text-decoration:none;">Home</a> &middot;
        <a href="../sitemap.html" style="color:var(--gray,#888);text-decoration:none;">Site Map</a> &middot;
        <a href="https://usmcmin.org" style="color:var(--gray,#888);text-decoration:none;">Ministry Site</a>
    </p>
    <p style="margin-top:8px;font-size:0.78rem;color:#555;">&copy; 2026 Bow & Arrow Studio &mdash; U.S.M.C. Ministries</p>
</footer>
</body>
</html>
