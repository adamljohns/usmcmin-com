<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bow & Arrow Studio — Guest Communications</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://usmcmin.com/bow-arrow/comms.html">
    <meta property="og:title" content="Bow & Arrow Studio — Guest Communications">
    <meta property="og:description" content="Guest communication log and message history for Bow & Arrow Studio.">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .comms-container { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; min-height: 500px; }
        
        /* Guest List Sidebar */
        .guest-sidebar {
            background: var(--warm-white);
            border: 1px solid var(--light-gray);
            border-radius: 2px;
            overflow: hidden;
        }
        .guest-sidebar-header {
            padding: 1rem 1.25rem;
            background: var(--warm-brown);
            color: var(--blush-light);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .guest-search {
            padding: 0.75rem;
            border-bottom: 1px solid var(--light-gray);
        }
        .guest-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--light-gray);
            border-radius: 2px;
            font-size: 0.85rem;
            background: var(--cream);
            font-family: var(--font-sans);
        }
        .guest-search input:focus { outline: none; border-color: var(--terracotta); }
        .guest-list { max-height: 450px; overflow-y: auto; }
        .guest-list-item {
            padding: 0.85rem 1.25rem;
            border-bottom: 1px solid var(--linen);
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .guest-list-item:hover { background: var(--linen); }
        .guest-list-item.active { background: var(--blush-light); border-left: 3px solid var(--terracotta); }
        .guest-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--terracotta);
            color: white; display: flex; align-items: center; justify-content: center;
            font-family: var(--font-serif); font-weight: 700; font-size: 0.9rem;
            flex-shrink: 0;
        }
        .guest-list-info { flex: 1; min-width: 0; }
        .guest-list-name {
            font-family: var(--font-serif); font-weight: 600; font-size: 0.9rem;
            color: var(--warm-brown); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .guest-list-apt { font-size: 0.7rem; color: var(--gray); }
        .guest-list-badge {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .badge-active { background: var(--sage); }
        .badge-upcoming { background: var(--blue); }
        .badge-past { background: var(--light-gray); }

        /* Conversation Panel */
        .convo-panel {
            background: var(--warm-white);
            border: 1px solid var(--light-gray);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
        }
        .convo-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
        }
        .convo-header-info h3 {
            font-family: var(--font-serif); font-weight: 600; font-size: 1.1rem;
            color: var(--warm-brown); text-transform: none; letter-spacing: 0;
        }
        .convo-header-info .meta {
            font-size: 0.75rem; color: var(--gray); margin-top: 0.15rem;
        }
        .convo-tags { display: flex; gap: 0.4rem; }
        .convo-tag {
            padding: 0.2rem 0.6rem; border-radius: 2px;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tag-checkin { background: var(--sage-light); color: var(--sage); }
        .tag-checkout { background: #fce4e4; color: var(--dusty-rose); }
        .tag-confirmed { background: #e3f2fd; color: var(--blue); }
        .tag-review { background: #fff9c4; color: #b8860b; }

        /* Message Thread */
        .convo-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 400px;
        }
        .msg-group { margin-bottom: 1.5rem; }
        .msg-date {
            text-align: center;
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 1rem;
            position: relative;
        }
        .msg-date::before, .msg-date::after {
            content: ''; position: absolute; top: 50%;
            width: calc(50% - 60px); height: 1px; background: var(--light-gray);
        }
        .msg-date::before { left: 0; }
        .msg-date::after { right: 0; }
        .msg-bubble {
            max-width: 80%;
            padding: 0.85rem 1.15rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
            animation: fadeSlideUp 0.2s ease;
        }
        .msg-host {
            background: var(--terracotta);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .msg-guest {
            background: var(--linen);
            color: var(--dark-brown);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .msg-system {
            background: #fff9c4;
            color: #8d6e00;
            margin: 0 auto;
            text-align: center;
            font-size: 0.8rem;
            font-style: italic;
            border-radius: 6px;
            max-width: 60%;
        }
        .msg-time {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.7);
            margin-top: 0.25rem;
        }
        .msg-guest .msg-time { color: var(--gray); }
        .msg-system .msg-time { color: #b8860b; }

        /* Compose */
        .convo-compose {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--light-gray);
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            background: var(--cream);
        }
        .convo-compose textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-size: 0.9rem;
            resize: none;
            min-height: 42px;
            max-height: 100px;
            background: var(--warm-white);
            font-family: var(--font-sans);
        }
        .convo-compose textarea:focus { outline: none; border-color: var(--terracotta); }
        .convo-compose button {
            padding: 10px 20px;
            background: var(--terracotta);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .convo-compose button:hover { background: var(--terracotta-dark); }

        /* Quick Templates */
        .quick-templates {
            padding: 0.75rem 1.5rem;
            border-top: 1px solid var(--linen);
            background: var(--cream);
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .template-chip {
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--blush);
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--warm-brown);
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--font-sans);
            background: var(--warm-white);
        }
        .template-chip:hover {
            background: var(--terracotta);
            color: white;
            border-color: var(--terracotta);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            color: var(--gray);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state p { font-family: var(--font-serif); font-style: italic; }

        /* Stats Bar */
        .comms-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .comms-stat {
            background: var(--warm-white);
            padding: 1.25rem;
            border: 1px solid var(--light-gray);
            border-radius: 2px;
            text-align: center;
        }
        .comms-stat .stat-value {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--terracotta);
        }
        .comms-stat .stat-label {
            font-size: 0.65rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-top: 0.25rem;
        }

        @media (max-width: 768px) {
            .comms-container {
                grid-template-columns: 1fr;
            }
            .guest-sidebar { max-height: 250px; }
            .guest-list { max-height: 200px; }
        }
    </style>
</head>

                { label: '🍕 Restaurants', text: 'Check out our food guide: bowandarrowphotographystudio.com/fredericksburg-virginia-downtown-food-guide/ — Top picks: Foode, Eileen\'s Bakery, Orofino Italian.' },

            ]

        let selectedGuest = null;

        // Render guest list
        function renderGuestList(filter = '') {
            const list = document.getElementById('guestList');
            const filtered = COMMS.guests.filter(g =>
                g.name.toLowerCase().includes(filter.toLowerCase()) ||
                g.apt.toLowerCase().includes(filter.toLowerCase())
            );

            list.innerHTML = filtered.map(g => {
                const badgeClass = g.status === 'active' ? 'badge-active' : g.status === 'upcoming' ? 'badge-upcoming' : 'badge-past';
                const lastMsg = g.messages[g.messages.length - 1];
                const unread = g.messages.filter(m => m.from === 'guest').length > 0 && g.status === 'active';
                return `
                    <div class="guest-list-item${selectedGuest?.id === g.id ? ' active' : ''}" onclick="selectGuest(${g.id})">
                        <div class="guest-avatar" style="background:${g.avatar_color}">${g.name.charAt(0)}</div>
                        <div class="guest-list-info">
                            <div class="guest-list-name">${g.name}</div>
                            <div class="guest-list-apt">Apt ${g.apt} · ${formatDate(g.checkin)} – ${formatDate(g.checkout)}</div>
                        </div>
                        <div class="guest-list-badge ${badgeClass}"></div>
                    </div>
                `;
            }).join('');
        }

        function filterGuests(val) { renderGuestList(val); }

        function selectGuest(id) {
            selectedGuest = COMMS.guests.find(g => g.id === id);
            renderGuestList(document.getElementById('guestSearch').value);
            renderConversation(selectedGuest);
        }

        function renderConversation(guest) {
            const panel = document.getElementById('convoPanel');
            const statusTag = guest.status === 'active' ? '<span class="convo-tag tag-checkin">Checked In</span>' :
                              guest.status === 'upcoming' ? '<span class="convo-tag tag-confirmed">Confirmed</span>' :
                              '<span class="convo-tag tag-checkout">Past</span>';
            const nights = nightsBetween(guest.checkin, guest.checkout);

            // Group messages by date
            const groups = {};
            guest.messages.forEach(m => {
                const date = m.time.split(' ')[0];
                if (!groups[date]) groups[date] = [];
                groups[date].push(m);
            });

            panel.innerHTML = `
                <div class="convo-header">
                    <div class="convo-header-info">
                        <h3>${guest.name}</h3>
                        <div class="meta">Apt ${guest.apt} · ${formatDate(guest.checkin)} → ${formatDate(guest.checkout)} · ${nights} night${nights !== 1 ? 's' : ''}</div>
                    </div>
                    <div class="convo-tags">${statusTag}</div>
                </div>
                <div class="convo-messages" id="convoMessages">
                    ${Object.entries(groups).map(([date, msgs]) => `
                        <div class="msg-group">
                            <div class="msg-date">${formatDate(date)}</div>
                            ${msgs.map(m => {
                                const time = m.time.split(' ')[1] || '';
                                const hrs = parseInt(time.split(':')[0]);
                                const ampm = hrs >= 12 ? 'PM' : 'AM';
                                const h12 = hrs > 12 ? hrs - 12 : hrs === 0 ? 12 : hrs;
                                const timeStr = time ? `${h12}:${time.split(':')[1]} ${ampm}` : '';
                                if (m.from === 'system') {
                                    return `<div class="msg-bubble msg-system">${m.text}<div class="msg-time">${timeStr}</div></div>`;
                                }
                                return `<div class="msg-bubble msg-${m.from}">
                                    ${m.text}
                                    <div class="msg-time">${m.from === 'host' ? 'You · ' : ''}${timeStr}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    `).join('')}
                </div>
                <div class="quick-templates" id="quickTemplates">
                    ${COMMS.templates.map((t, i) => `<span class="template-chip" onclick="useTemplate(${i})">${t.label}</span>`).join('')}
                </div>
                <div class="convo-compose">
                    <textarea id="composeMsg" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
                    <button onclick="sendMsg()">Send</button>
                </div>
            `;

            // Scroll to bottom
            const msgs = document.getElementById('convoMessages');
            msgs.scrollTop = msgs.scrollHeight;
        }

        function useTemplate(index) {
            const template = COMMS.templates[index];
            const text = template.text.replace('{name}', selectedGuest?.name || 'Guest');
            document.getElementById('composeMsg').value = text;
            document.getElementById('composeMsg').focus();
        }

        function sendMsg() {
            const input = document.getElementById('composeMsg');
            const text = input.value.trim();
            if (!text || !selectedGuest) return;

            // Add to messages
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            selectedGuest.messages.push({ from: 'host', text, time: timeStr });
            input.value = '';
            renderConversation(selectedGuest);
            showToast('Message sent (demo mode — connect backend for Airbnb sync)');
        }

        // Toast notification
        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:var(--warm-brown);color:white;padding:0.85rem 1.5rem;border-radius:2px;font-size:0.85rem;font-family:var(--font-sans);box-shadow:0 4px 20px rgba(0,0,0,0.2);z-index:200;transform:translateY(100px);opacity:0;transition:all 0.3s ease;';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            requestAnimationFrame(() => {
                toast.style.transform = 'translateY(0)';
                toast.style.opacity = '1';
                setTimeout(() => {
                    toast.style.transform = 'translateY(100px)';
                    toast.style.opacity = '0';
                }, 3000);
            });
        }

        // Initialize
        renderGuestList();
        // Auto-select first active guest
        const firstActive = COMMS.guests.find(g => g.status === 'active');
        if (firstActive) selectGuest(firstActive.id);
    </script>
</body>
</html>
