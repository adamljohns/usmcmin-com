<head>

</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="brand-script">Bow & Arrow</div>
            <div class="brand-sub">Studio · LLC</div>
            <div style="width:40px;height:1px;background:var(--blush);margin:1.25rem auto 1.5rem"></div>
            <h1>Operations Portal</h1>
            <p class="subtitle">Steward Access</p>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" autofocus>
                <button type="submit">Enter Dashboard</button>
            </form>
            <p class="login-error" id="loginError">Incorrect password. Please try again.</p>
        </div>
    </div>

    <script>
        // Check if already authenticated
        if (localStorage.getItem('ba_auth') === 'steward-2026') {
            window.location.href = 'dashboard.html';
        }

        function handleLogin(e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;
            if (pw === 'steward') {
                localStorage.setItem('ba_auth', 'steward-2026');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
            return false;
        }
    </script>
<footer style="text-align:center; padding:28px 20px; border-top:1px solid var(--border,#333); margin-top:40px; color:var(--gray,#888); font-size:0.88rem;">
    <div style="margin-bottom:10px;"><img src="../assets/icons/shield-handshake.png" alt="" width="36" height="36" style="opacity:0.6;"></div>

        <a href="https://usmcmin.org" style="color:var(--gray,#888);text-decoration:none;">Ministry Site</a>
    </p>
    <p style="margin-top:8px;font-size:0.78rem;color:#555;">&copy; 2026 Bow & Arrow Studio &mdash; U.S.M.C. Ministries</p>
</footer>
