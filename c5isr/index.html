<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C5iSR — Christ-Centered Crypto Stewardship</title>
  <meta name="description" content="C5iSR Trading Dashboard — Christ-centered crypto stewardship intelligence.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://usmcmin.com/c5isr/">
  <meta property="og:title" content="C5iSR — Christ-Centered Crypto Stewardship">
  <meta property="og:description" content="Crypto market intelligence through a biblical stewardship lens.">
  <meta property="og:image" content="https://usmcmin.com/assets/og/og-brain.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="C5iSR — Christ-Centered Crypto Stewardship">
  <meta name="twitter:description" content="Crypto market intelligence through a biblical stewardship lens.">
  <meta name="twitter:image" content="https://usmcmin.com/assets/og/og-brain.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0,136,255,0.03) 0%, transparent 50%);
    }
    .login-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
    }
    .login-logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .login-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #00ff88;
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-family: 'Inter', sans-serif;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .login-input {
      width: 100%;
      padding: 14px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
      box-sizing: border-box;
    }
    .login-input:focus {
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0,255,136,0.15);
    }
    .login-input::placeholder { color: rgba(255,255,255,0.25); }
    .login-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      border: none;
      border-radius: 10px;
      color: #0a0a0f;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,255,136,0.3); }
    .login-btn:active { transform: translateY(0); }
    .login-error {
      color: #ff3355;
      font-size: 13px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      font-family: 'JetBrains Mono', monospace;
    }
    .login-error.visible { opacity: 1; }
    .login-verse {
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      font-style: italic;
      margin-top: 32px;
      line-height: 1.6;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.6s ease; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card" id="loginCard">
      <div class="login-logo">✝️📊</div>
      <div class="login-title">C5iSR</div>
      <div class="login-subtitle">Christ-Centered Crypto Stewardship</div>
      
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <input type="password" class="login-input" id="passwordInput" 
               placeholder="Enter stewardship key" autocomplete="off" autofocus>
        <button type="submit" class="login-btn">ACCESS DASHBOARD</button>
      </form>
      
      <div class="login-error" id="loginError">Invalid key. Access denied.</div>
      
      <div class="login-verse">
        "Moreover, it is required of stewards that they be found faithful."<br>
        — 1 Corinthians 4:2
      </div>
      <div style="margin-top:20px;font-size:12px;">
        <a href="https://usmcmin.org/finance.html" target="_blank" style="color:rgba(255,255,255,0.4);text-decoration:none;">Ministry Finance Resources → usmcmin.org</a>
      </div>
    </div>
  </div>

  <script>
    // Check if already authenticated
    if (localStorage.getItem('c5isr_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('passwordInput').value;
      const card = document.getElementById('loginCard');
      const error = document.getElementById('loginError');
      
      if (pw === 'steward') {
        localStorage.setItem('c5isr_auth', 'true');
        localStorage.setItem('c5isr_auth_time', Date.now().toString());
        window.location.href = 'dashboard.html';
      } else {
        card.classList.add('shake');
        error.classList.add('visible');
        document.getElementById('passwordInput').value = '';
        setTimeout(() => card.classList.remove('shake'), 600);
        setTimeout(() => error.classList.remove('visible'), 3000);
      }
      return false;
    }
  </script>
</body>
</html>
