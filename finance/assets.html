<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Net Worth — Fin Command</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/finance-apple-touch-icon.png">
  <link rel="manifest" href="finance.webmanifest">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root { --gold:#D4AF37; --bg:#0a0a0a; --card:#141416; --border:#2A2D35; --gray:#9aa0a8; --green:#4ade80; --red:#f87171; --orange:#fbbf24; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:#F0F0F0; font-family:system-ui,-apple-system,sans-serif; min-height:100vh;
           padding:calc(env(safe-area-inset-top,0px) + 12px) 14px calc(env(safe-area-inset-bottom,0px) + 24px); max-width:760px; margin:0 auto; }
    a { color:var(--gold); text-decoration:none; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .top h1 { font-size:1.05rem; color:var(--gold); letter-spacing:0.04em; }
    .top .nav { font-size:0.85rem; color:var(--gray); }
    .banner { background:rgba(255,165,0,0.08); border:1px solid rgba(255,165,0,0.4); color:#f5c46a;
              border-radius:10px; padding:12px 14px; font-size:0.83rem; line-height:1.5; margin-bottom:14px; display:none; }
    .hero { background:var(--card); border:1px solid var(--gold); border-radius:14px; padding:18px 16px; margin-bottom:14px; text-align:center; }
    .hero .big { font-size:2rem; font-weight:700; color:var(--gold); }
    .hero .sub { color:var(--gray); font-size:0.8rem; margin-top:4px; }
    .hero .row { display:flex; justify-content:space-around; margin-top:14px; }
    .hero .cell .v { font-weight:700; font-size:1rem; }
    .hero .cell .k { color:var(--gray); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.07em; margin-top:2px; }
    .sect { color:var(--gray); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; margin:18px 0 8px; }
    .item { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
    .item.unv { border-color:rgba(251,191,36,0.5); }
    .item .r1 { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
    .item .nm { font-size:0.88rem; line-height:1.3; }
    .item .val { font-weight:700; white-space:nowrap; font-size:0.98rem; }
    .item .val.metal { color:var(--gold); } .item .val.debt { color:var(--red); }
    .item .note { color:var(--gray); font-size:0.72rem; margin-top:4px; line-height:1.4; }
    .item .edit { display:flex; gap:8px; margin-top:9px; }
    .item .edit input { flex:1; background:#0f0f11; border:1px solid var(--border); border-radius:8px; color:#fff; padding:9px 10px; font-size:0.9rem; font-family:inherit; }
    .item .edit button { background:var(--gold); color:#000; border:none; border-radius:8px; padding:0 16px; font-weight:700; font-size:0.85rem; cursor:pointer; }
    .badge { font-size:0.66rem; padding:2px 8px; border-radius:11px; border:1px solid var(--orange); color:var(--orange); }
    #gate { position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
    #gate .g-card { max-width:360px; width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:32px 24px; text-align:center; }
    #gate input { width:100%; background:#0f0f11; border:1px solid var(--border); border-radius:8px; color:#fff; padding:12px; margin:14px 0; text-align:center; font-size:1rem; }
    #gate button { width:100%; background:var(--gold); color:#000; border:none; border-radius:8px; padding:12px; font-weight:700; font-size:1rem; cursor:pointer; }
  </style>
</head>
<body>

<div id="gate" style="display:none">
  <div class="g-card"><div style="font-size:1.6rem">🔒</div>
    <h2 style="color:var(--gold);font-size:1.1rem;margin:8px 0 4px">Steward Access</h2>
    <input type="password" id="gatePass" placeholder="Access code" onkeydown="if(event.key==='Enter')gateUnlock()">
    <button onclick="gateUnlock()">Unlock</button></div>
</div>

<div class="top">
  <h1>💠 Net Worth — Full Picture</h1>
  <div class="nav"><a href="forecast.html">Forecast</a> · <a href="finance.html">Dashboard</a></div>
</div>

<div class="banner" id="banner"></div>

<div class="hero" id="hero" style="display:none">
  <div class="big" id="hNet">—</div>
  <div class="sub" id="hSub">complete net worth (all assets − all debts)</div>
  <div class="row">
    <div class="cell"><div class="v" id="hAssets">—</div><div class="k">Total assets</div></div>
    <div class="cell"><div class="v" id="hDebts">—</div><div class="k">Total debts</div></div>
    <div class="cell"><div class="v" id="hCashOnly">—</div><div class="k">Cash-only net</div></div>
  </div>
</div>

<div id="body"></div>

<script>
var API_CANDIDATES = ['http://127.0.0.1:3847', 'https://intake.usmcmin.com'];
var API = null, PW = localStorage.getItem('moop_finance_auth') || 'steward-2026';
var data = null;

function gateUnlock() {
  if (document.getElementById('gatePass').value === 'steward') {
    localStorage.setItem('moop_steward_auth','true'); localStorage.setItem('moop_finance_auth','steward-2026');
    document.getElementById('gate').style.display='none'; boot();
  } else { var e=document.getElementById('gatePass'); e.value=''; e.placeholder='Invalid code'; }
}
async function resolveApi(){ for(var i=0;i<API_CANDIDATES.length;i++){ try{ var c=new AbortController(); var t=setTimeout(()=>c.abort(),2500);
  var r=await fetch(API_CANDIDATES[i]+'/health',{signal:c.signal}); clearTimeout(t); if(r.ok) return API_CANDIDATES[i]; }catch(e){} } return null; }
function banner(m){ var b=document.getElementById('banner'); b.innerHTML=m; b.style.display=m?'block':'none'; }
async function api(pathq,opts){ var s=pathq.indexOf('?')>=0?'&':'?'; var r=await fetch(API+pathq+s+'pw='+encodeURIComponent(PW),opts); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }
function fmt$(n){ var s='$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0}); return n<0?'−'+s:s; }
var CAT = {metal:'Precious Metals',crypto:'Crypto',retirement:'Retirement & Brokerage',real_estate:'Real Estate',business:'Business Equity',cash:'Cash',other:'Other'};

async function loadAll() {
  var nw = await api('/fin/networth-complete');
  document.getElementById('hero').style.display='block';
  document.getElementById('hNet').textContent = fmt$(nw.complete_net_worth);
  document.getElementById('hAssets').textContent = fmt$(nw.assets.total);
  document.getElementById('hDebts').textContent = fmt$(nw.debts.total);
  document.getElementById('hCashOnly').textContent = fmt$(nw.cash_only_net_worth);
  document.getElementById('hSub').textContent = nw.unverified_inputs>0
    ? nw.unverified_inputs+' inputs still estimated — confirm below' : 'all inputs verified';

  data = await api('/fin/assets');
  var wrap = document.getElementById('body'); wrap.innerHTML='';
  // cash summary (read-only, from SimpleFIN)
  var cashDiv=document.createElement('div'); cashDiv.className='sect'; cashDiv.textContent='Bank & Cards (auto — SimpleFIN)'; wrap.appendChild(cashDiv);
  var ci=document.createElement('div'); ci.className='item';
  ci.innerHTML='<div class="r1"><div class="nm">Cash across all accounts</div><div class="val">'+fmt$(nw.assets.cash)+'</div></div>'+
               '<div class="r1" style="margin-top:6px"><div class="nm">Card & bank-loan debt</div><div class="val debt">'+fmt$(-nw.debts.cards_and_bank_loans)+'</div></div>'+
               '<div class="note">Updated every Friday by the SimpleFIN sync. Edit these in your bank, not here.</div>';
  wrap.appendChild(ci);

  // group manual assets by category
  var groups={}; data.assets.forEach(function(a){ (groups[a.category]=groups[a.category]||[]).push(a); });
  Object.keys(groups).forEach(function(cat){
    var s=document.createElement('div'); s.className='sect'; s.textContent=CAT[cat]||cat; wrap.appendChild(s);
    groups[cat].forEach(function(a){ wrap.appendChild(renderAsset(a)); });
  });
  // loans
  var ls=document.createElement('div'); ls.className='sect'; ls.textContent='Loans (non-bank — mortgage etc.)'; wrap.appendChild(ls);
  data.loans.forEach(function(l){ wrap.appendChild(renderLoan(l)); });
}

function renderAsset(a) {
  var div=document.createElement('div'); div.className='item'+(a.verified?'':' unv');
  var val=a.computed.value, spot=a.computed.priced_at_spot;
  var editField = a.price_source
    ? '<input inputmode="decimal" placeholder="quantity ('+a.unit+')" value="'+(a.quantity!=null?a.quantity:'')+'" data-field="quantity">'
    : '<input inputmode="decimal" placeholder="value $" value="'+(a.value_usd!=null?a.value_usd:'')+'" data-field="value_usd">';
  div.innerHTML='<div class="r1"><div class="nm">'+a.name+(a.verified?'':' <span class="badge">estimate</span>')+'</div>'+
    '<div class="val'+(a.category==='metal'?' metal':'')+'">'+fmt$(val)+'</div></div>'+
    (a.note?'<div class="note">'+a.note+(spot?' · @ $'+spot+'/'+(a.unit||'unit').replace('oz_','')+' spot':'')+'</div>':'')+
    '<div class="edit">'+editField+'<button>Save</button></div>';
  var inp=div.querySelector('input'), btn=div.querySelector('button');
  btn.onclick=async function(){ var v=parseFloat(inp.value); if(isNaN(v)) return;
    var body={kind:'asset',name:a.name}; body[inp.dataset.field]=v;
    try{ await api('/fin/assets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); await loadAll(); }
    catch(e){ banner('Save failed: '+e.message); } };
  return div;
}
function renderLoan(l) {
  var div=document.createElement('div'); div.className='item'+(l.verified?'':' unv');
  div.innerHTML='<div class="r1"><div class="nm">'+l.name+(l.verified?'':' <span class="badge">estimate</span>')+'</div>'+
    '<div class="val debt">'+fmt$(-l.balance_usd)+'</div></div>'+
    (l.note?'<div class="note">'+l.note+'</div>':'')+
    '<div class="edit"><input inputmode="decimal" placeholder="current balance $" value="'+l.balance_usd+'"><button>Save</button></div>';
  var inp=div.querySelector('input'), btn=div.querySelector('button');
  btn.onclick=async function(){ var v=parseFloat(inp.value); if(isNaN(v)) return;
    try{ await api('/fin/assets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:'loan',name:l.name,balance_usd:v})}); await loadAll(); }
    catch(e){ banner('Save failed: '+e.message); } };
  return div;
}

async function boot() {
  API = await resolveApi();
  if (!API) { banner('<strong>Finance API unreachable.</strong> This page talks to the subscribe-server on Adam\'s Mac; open it there, or wait for the intake.usmcmin.com tunnel.'); return; }
  try { await loadAll(); } catch(e){ banner('<strong>Could not load:</strong> '+e.message); }
}
(function(){ var a=localStorage.getItem('moop_steward_auth')==='true'||localStorage.getItem('moop_finance_auth')==='steward-2026';
  if(!a) document.getElementById('gate').style.display='flex'; else boot(); })();
</script>
<script>
  if ('serviceWorker' in navigator) window.addEventListener('load', function(){ navigator.serviceWorker.register('/finance/finance-sw.js').catch(function(){}); });
</script>
</body>
</html>
